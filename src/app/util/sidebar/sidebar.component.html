<nav class="sidebar sidebar--desktop" *ngIf="isLoggedIn()">
  <div class="brand">
    <div class="brand-mark">
      <img src="assets/brand/logo_b.svg" alt="WaiterO" />
    </div>
    <div class="brand-copy">
      <strong>{{ brandTitle }}</strong>
      <span>{{ brandCaption }}</span>
    </div>
  </div>

  <ul>
    <li *ngFor="let item of primaryItems" [routerLink]="item.route" routerLinkActive="active">
      <span class="material-symbols-outlined">{{ item.icon }}</span>
      <span class="label">{{ item.label }}</span>
    </li>

    <li *ngFor="let item of secondaryItems" [routerLink]="item.route" routerLinkActive="active">
      <span class="material-symbols-outlined">{{ item.icon }}</span>
      <span class="label">{{ item.label }}</span>
    </li>
  </ul>

  <div class="sidebar-footer">
    <span>{{ footerLabel }}</span>
  </div>
</nav>

<div class="mobile-nav-shell" *ngIf="isLoggedIn()">
  <div class="mobile-nav-drawer-backdrop" *ngIf="mobileMoreOpen" (click)="closeMobileMore()"></div>

  <div class="mobile-nav-drawer" [class.open]="mobileMoreOpen" *ngIf="secondaryItems.length > 0">
    <button
      type="button"
      class="mobile-nav-drawer__item"
      *ngFor="let item of secondaryItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      (click)="closeMobileMore()"
    >
      <span class="material-symbols-outlined">{{ item.icon }}</span>
      <span>{{ item.label }}</span>
    </button>
  </div>

  <nav class="mobile-nav" aria-label="Navigazione principale backoffice" [style.gridTemplateColumns]="mobileGridColumns">
    <a
      class="mobile-nav__item"
      *ngFor="let item of primaryItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="closeMobileMore()"
    >
      <span class="material-symbols-outlined">{{ item.icon }}</span>
      <span class="mobile-nav__label">{{ item.label }}</span>
    </a>

    <button
      *ngIf="secondaryItems.length > 0"
      type="button"
      class="mobile-nav__item mobile-nav__item--more"
      [class.active]="mobileMoreOpen || hasSecondaryActiveRoute()"
      (click)="toggleMobileMore()"
      aria-label="Apri altre sezioni"
      [attr.aria-expanded]="mobileMoreOpen"
    >
      <span class="material-symbols-outlined">widgets</span>
      <span class="mobile-nav__label">Altro</span>
    </button>
  </nav>
</div>
