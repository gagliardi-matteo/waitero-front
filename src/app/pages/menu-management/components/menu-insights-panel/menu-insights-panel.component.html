<section class="insights-panel">
  <div class="insight-card">
    <div class="insight-label">Top performer</div>
    <div class="insight-value">{{ topPerformerCount }}</div>
    <p>I piatti che stanno convertendo meglio e meritano evidenza.</p>
  </div>

  <div class="insight-card warning">
    <div class="insight-label">Da ottimizzare</div>
    <div class="insight-value">{{ optimizationCount }}</div>
    <p>Piatti molto visti ma con conversione debole.</p>
  </div>

  <div class="insight-card soft">
    <div class="insight-label">Upsell attivabili</div>
    <div class="insight-value">{{ upsellOpportunityCount }}</div>
    <p>Piatti che possono trainare bevande, contorni o dolci.</p>
  </div>
</section>
