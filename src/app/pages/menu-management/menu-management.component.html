<div class="content">
  <div class="page-header">
    <div>
      <h1>Menu</h1>
      <p class="page-subtitle">Gestisci i piatti con una vista piu pulita e rapida.</p>
    </div>
    <button class="add-button" [routerLink]="['/add-dish']">Inserisci Piatto</button>
  </div>

  <app-menu-insights-panel
    [topPerformerCount]="topPerformerCount"
    [optimizationCount]="optimizationCount"
    [upsellOpportunityCount]="upsellOpportunityCount"
  />

  <app-menu-autopilot-panel
    [recommendedCandidates]="autopilotRecommendedCandidates"
    [optimizationQueue]="autopilotOptimizationQueue"
    [categoryPlans]="autopilotCategoryPlans"
    [applyingAutopilot]="applyingAutopilot"
    (applyRecommended)="applyAutopilotRecommended($event)"
  />

  <div *ngFor="let entry of menuByCategory" class="category-section">
    <div class="category-heading">
      <h2 class="category-title">{{ entry[0] }}</h2>
      <span class="category-count">{{ entry[1].length }} piatti</span>
    </div>

    <div class="menu-grid">
      <a class="menu-card" *ngFor="let item of entry[1]; trackBy: trackDish" [routerLink]="['/ristoratore/piatto', item.id]">
        <div class="card-image-shell">
          <img [src]="getImageUrl(item.imageUrl)" alt="{{ item.nome }}" />
          <span class="top-badge" *ngIf="item.consigliato">Top</span>
        </div>
        <div class="info">
          <h3 class="name">{{ item.nome }}</h3>
          <p class="description">{{ item.descrizione || item.categoria }}</p>
          <div class="card-footer">
            <span class="price">{{ item.prezzo }}&euro;</span>
            <span class="metric">{{ item.numeroOrdini ?? 0 }} ordini - {{ formatRate(item.viewToOrderRate) }}</span>
          </div>
          <div class="actions" (click)="$event.stopPropagation()">
            <button class="text-btn" [routerLink]="['/ristoratore/piatto/modifica', item.id]">Modifica</button>
            <button class="text-btn danger" [disabled]="deletingDishId === item.id" (click)="deleteDish(item, $event)">Elimina</button>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
