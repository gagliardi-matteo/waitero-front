<div class="dish-form-page">
  <div class="dish-form-card">
    <div class="form-header">
      <div class="form-header-top">
        <button class="ghost-btn back-btn" type="button" [routerLink]="['/menu-management']">
          <span class="material-symbols-outlined">arrow_back</span>
          <span>Torna ai piatti</span>
        </button>
      </div>

      <div>
        <span class="eyebrow">Menu Management</span>
        <h1 class="page-title">Aggiungi Piatto</h1>
        <p>Crea una nuova scheda menu mantenendo lo stesso flusso funzionale esistente.</p>
      </div>
    </div>

    <form [formGroup]="dishForm" (ngSubmit)="onSubmit()">
      <section class="form-section">
        <h2>Dati principali</h2>

        <label>
          <span>Nome</span>
          <input type="text" formControlName="nome" />
        </label>

        <label>
          <span>Descrizione</span>
          <textarea formControlName="descrizione" class="descrizione" id="descrizione"></textarea>
        </label>

        <label>
          <span>Ingredienti finali del piatto</span>
          <textarea formControlName="ingredienti" class="descrizione" placeholder="Lascia vuoto per usare i suggerimenti automatici, oppure inserisci la tua ricetta separando gli ingredienti con una virgola"></textarea>
        </label>
      </section>

      <section class="form-section">
        <h2>Scoperta e allergeni</h2>

        <label class="recommend-checkbox">
          <input type="checkbox" formControlName="consigliato" />
          <span>Mostra questo piatto tra i consigliati per il cliente</span>
        </label>

        <label>
          <span>Allergeni standard</span>
        </label>
        <div class="allergen-grid">
          <button
            type="button"
            class="allergen-chip"
            *ngFor="let allergen of standardAllergens"
            [class.active]="isAllergenSelected(allergen)"
            (click)="toggleAllergen(allergen)"
          >
            {{ allergen }}
          </button>
        </div>

        <label>
          <span>Altri allergeni / note</span>
          <textarea formControlName="allergeniCustom" class="descrizione" placeholder="Es. tracce di pistacchio, contaminazione crociata"></textarea>
        </label>
      </section>

      <section class="form-section compact-grid">
        <label>
          <span>Categoria</span>
          <select formControlName="categoria">
            <option disabled value="">Seleziona...</option>
            <option>Primo</option>
            <option>Secondo</option>
            <option>Dolce</option>
            <option>Contorno</option>
          </select>
        </label>

        <label>
          <span>Prezzo</span>
          <input type="number" formControlName="prezzo" min="0" />
        </label>
      </section>

      <section class="form-section">
        <h2>Immagine</h2>

        <label>
          <span>Carica immagine</span>
          <input type="file" (change)="onFileSelected($event)" />
        </label>

        <img *ngIf="previewUrl" [src]="previewUrl" width="150" class="preview-img" />
      </section>

      <div class="form-actions">
        <button class="ghost-btn" type="button" [routerLink]="['/menu-management']">Indietro</button>
        <button class="primary-btn" type="submit" [disabled]="dishForm.invalid">Salva</button>
      </div>
    </form>
  </div>
</div>
