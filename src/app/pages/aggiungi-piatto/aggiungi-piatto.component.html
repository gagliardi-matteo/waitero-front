<div class="add-dish-form">
  <h2>Aggiungi Piatto</h2>
  <form [formGroup]="dishForm" (ngSubmit)="onSubmit()">
    <label>Nome</label>
    <input type="text" formControlName="nome" />

    <label>Descrizione</label>
    <textarea formControlName="descrizione" class="descrizione" id="descrizione"></textarea>

    <label>Ingredienti finali del piatto</label>
    <textarea formControlName="ingredienti" class="descrizione" placeholder="Lascia vuoto per usare i suggerimenti automatici, oppure inserisci la tua ricetta separando gli ingredienti con una virgola"></textarea>

    <label class="recommend-checkbox">
      <input type="checkbox" formControlName="consigliato" />
      Mostra questo piatto tra i consigliati per il cliente
    </label>

    <label>Allergeni standard</label>
    <div class="allergen-grid">
      <button
        type="button"
        class="allergen-chip"
        *ngFor="let allergen of standardAllergens"
        [class.active]="isAllergenSelected(allergen)"
        (click)="toggleAllergen(allergen)"
      >
        {{ allergen }}
      </button>
    </div>

    <label>Altri allergeni / note</label>
    <textarea formControlName="allergeniCustom" class="descrizione" placeholder="Es. tracce di pistacchio, contaminazione crociata"></textarea>

    <label>Categoria</label>
    <select formControlName="categoria">
      <option disabled value="">Seleziona...</option>
      <option>Primo</option>
      <option>Secondo</option>
      <option>Dolce</option>
      <option>Contorno</option>
    </select>

    <label>Prezzo</label>
    <input type="number" formControlName="prezzo" min="0" />

    <label>Immagine</label>
    <input type="file" (change)="onFileSelected($event)" />

    <img *ngIf="previewUrl" [src]="previewUrl" width="150" class="preview-img" />

    <button class="add-button" type="submit" [disabled]="dishForm.invalid">Salva</button>
    <button [routerLink]="['/menu-management']">
      Indietro
    </button>
  </form>
</div>
