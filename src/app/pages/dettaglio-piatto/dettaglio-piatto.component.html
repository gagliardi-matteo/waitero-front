<div *ngIf="errorMessage" class="detail-page">
  <div class="detail-content">
    <div class="info-box warning">
      <h3>Errore</h3>
      <p>{{ errorMessage }}</p>
    </div>
    <button class="primary-btn full-width" (click)="goBack()">Torna al menu</button>
  </div>
</div>

<div *ngIf="!errorMessage && piatto" class="detail-page">
  <div class="detail-content">
    <button class="back-link" (click)="goBack()"> Torna al menu</button>

    <img class="detail-image" [src]="piatto.imageUrl ? getImageUrl(piatto.imageUrl) : '/placeholder.png'" />

    <h1>{{ piatto.nome }}</h1>
    <p class="description">{{ piatto.descrizione }}</p>
    <p class="price">{{ piatto.prezzo.toFixed(2) }} &euro;</p>

    <div class="info-block warning" *ngIf="allergenBadges.length > 0">
      <h3>Allergeni</h3>
      <div class="badge-list">
        <span class="allergen-badge" *ngFor="let allergen of allergenBadges">{{ allergen }}</span>
      </div>
    </div>

    <div class="info-block" *ngIf="ingredientRows.length > 0">
      <h3>Ingredienti</h3>
      <div class="ingredient-list">
        <span *ngFor="let ingredient of ingredientRows">{{ ingredient }}</span>
      </div>
    </div>

    <div class="qty-row">
      <button class="round-btn" (click)="remove()">-</button>
      <span class="qty-number">{{ quantita() }}</span>
      <button class="round-btn filled" (click)="add()">+</button>
    </div>

    <button class="primary-btn full-width" (click)="addToCart()">Aggiungi al carrello</button>

    <div class="related-block" *ngIf="upsellSuggestions.length > 0">
      <h3>Potrebbe piacerti anche</h3>
      <div class="related-row">
        <div class="related-card" *ngFor="let suggestion of upsellSuggestions">
          <div>
            <strong>{{ suggestion.nome }}</strong>
            <p>{{ suggestion.prezzo.toFixed(2) }} &euro;</p>
          </div>
          <button class="round-btn filled" (click)="addSuggestion(suggestion)">+</button>
        </div>
      </div>
    </div>
  </div>
</div>
