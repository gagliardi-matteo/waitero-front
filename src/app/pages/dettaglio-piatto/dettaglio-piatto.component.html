<div *ngIf="errorMessage" class="detail-container">
  <div class="info-box warning">
    <h3>Errore</h3>
    <p>{{ errorMessage }}</p>
  </div>
  <button class="add-to-cart" (click)="goBack()">Torna al menu</button>
</div>

<div *ngIf="!errorMessage && piatto" class="detail-container">
  <button class="back-button" (click)="goBack()">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>

  <img class="detail-image" [src]="piatto.imageUrl ? getImageUrl(piatto.imageUrl) : '/placeholder.png'" />

  <h1>{{ piatto.nome }}</h1>
  <p class="description">{{ piatto.descrizione }}</p>
  <div class="price">{{ piatto.prezzo.toFixed(2) }} &euro;</div>

  <div class="info-box" *ngIf="ingredientRows.length > 0">
    <h3>Ingredienti</h3>
    <ul>
      <li *ngFor="let ingredient of ingredientRows">{{ ingredient }}</li>
    </ul>
  </div>

  <div class="info-box warning" *ngIf="allergenBadges.length > 0">
    <h3>Allergeni</h3>
    <div class="badge-list">
      <span class="allergen-badge" *ngFor="let allergen of allergenBadges">{{ allergen }}</span>
    </div>
  </div>

  <div class="actions">
    <button class="round-btn" (click)="remove()">-</button>
    <span class="qty-number">{{ quantita() }}</span>
    <button class="round-btn" (click)="add()">+</button>
  </div>

  <button class="add-to-cart" (click)="addToCart()">Aggiungi al carrello</button>

  <div class="info-box upsell-box" *ngIf="upsellSuggestions.length > 0">
    <h3>Perfetto con:</h3>
    <div class="upsell-list">
      <div class="upsell-item" *ngFor="let suggestion of upsellSuggestions">
        <div>
          <strong>{{ suggestion.nome }}</strong>
          <div>{{ suggestion.prezzo.toFixed(2) }} &euro;</div>
        </div>
        <button class="round-btn" (click)="addSuggestion(suggestion)">+</button>
      </div>
    </div>
  </div>
</div>
