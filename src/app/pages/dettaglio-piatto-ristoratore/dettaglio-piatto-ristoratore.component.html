<div *ngIf="errorMessage" class="detail-container">
  <div class="info-box warning">
    <h3>Errore</h3>
    <p>{{ errorMessage }}</p>
  </div>
  <button class="primary-btn" (click)="goBack()">Torna al menu</button>
</div>

<div *ngIf="!errorMessage && piatto" class="detail-container">
  <button class="back-button" (click)="goBack()">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>

  <img class="detail-image" [src]="getImageUrl(piatto.imageUrl)" alt="{{ piatto.nome }}" />

  <div class="category-label">{{ piatto.categoria }}</div>
  <h1>{{ piatto.nome }}</h1>
  <p class="description" *ngIf="piatto.descrizione">{{ piatto.descrizione }}</p>
  <div class="price">{{ piatto.prezzo.toFixed(2) }} &euro;</div>

  <div class="info-box" *ngIf="ingredientRows.length > 0">
    <h3>Ingredienti</h3>
    <ul>
      <li *ngFor="let ingredient of ingredientRows">{{ ingredient }}</li>
    </ul>
  </div>

  <div class="info-box warning" *ngIf="allergenBadges.length > 0">
    <h3>Allergeni</h3>
    <div class="badge-list">
      <span class="allergen-badge" *ngFor="let allergen of allergenBadges">{{ allergen }}</span>
    </div>
  </div>

  <div class="status-row">
    <span class="status-badge" [class.unavailable]="!piatto.disponibile">
      {{ piatto.disponibile ? 'Disponibile' : 'Non disponibile' }}
    </span>
  </div>

  <div class="actions">
    <button class="secondary-btn" (click)="goBack()">Chiudi</button>
    <a class="primary-btn" [routerLink]="['/ristoratore/piatto/modifica', piatto.id]">Modifica piatto</a>
  </div>
</div>
