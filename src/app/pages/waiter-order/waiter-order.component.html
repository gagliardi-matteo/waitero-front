<div class="content waiter-order-page">
  <div class="page-header">
    <div>
      <h1>Comanda</h1>
      <p>Inserisci ordine manuale.</p>
    </div>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <app-brand-loader
    *ngIf="loading"
    label="Preparazione comanda"
    hint="Caricamento tavoli e menu"
  />

  <div class="command-layout" *ngIf="!loading">
    <div class="command-main">
      <div>
        <p class="section-title">Seleziona tavolo</p>
        <div class="table-chip-row">
          <button
            type="button"
            *ngFor="let table of tables"
            class="table-chip"
            [class.active]="selectedTableId === table.id"
            (click)="selectTable(table.id)"
          >
            T{{ table.numero }}
          </button>
        </div>
      </div>

      <div class="category-row">
        <button
          type="button"
          *ngFor="let category of categories"
          class="category-chip"
          [class.active]="selectedCategory === category"
          (click)="selectedCategory = category"
        >
          {{ category === 'ALL' ? 'Tutti' : category }}
        </button>
      </div>

      <div class="item-grid">
        <button
          type="button"
          *ngFor="let dish of filteredDishes; trackBy: trackDish"
          class="menu-item-btn"
          (click)="increase(dish)"
        >
          <p>{{ dish.nome }}</p>
          <span>{{ dish.prezzo | number: '1.2-2' }} &euro;</span>
        </button>
      </div>
    </div>

    <aside class="command-cart">
      <div class="cart-head">
        <h3>Riepilogo: <span *ngIf="selectedTable; else noTableTpl">T{{ selectedTable.numero }}</span><ng-template #noTableTpl>Nessun tavolo</ng-template></h3>
      </div>

      <div *ngIf="selectedItems.length === 0" class="cart-empty">Aggiungi piatti dalla lista</div>

      <div class="cart-list" *ngIf="selectedItems.length > 0">
        <div class="cart-row" *ngFor="let item of selectedItems">
          <div class="cart-copy">
            <p>{{ item.dish.nome }}</p>
            <span>{{ item.dish.prezzo | number: '1.2-2' }} &euro;</span>
          </div>
          <div class="cart-actions">
            <button type="button" (click)="decrease(item.dish)">-</button>
            <span>{{ item.quantity }}</span>
            <button type="button" (click)="increase(item.dish)">+</button>
          </div>
        </div>
      </div>

      <div class="cart-footer" *ngIf="selectedItems.length > 0">
        <div class="cart-total">
          <span>Totale</span>
          <strong>{{ total | number: '1.2-2' }} &euro;</strong>
        </div>
        <button type="button" class="primary-btn" [disabled]="saving" (click)="submit()">
          {{ saving ? 'Invio...' : 'Invia comanda' }}
        </button>
      </div>
    </aside>
  </div>
</div>
