<div class="modifica-container">
  <div class="form-card">
    <h1 class="title">Modifica Piatto</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label>
        Nome
        <input type="text" formControlName="nome" />
      </label>

      <label>
        Descrizione
        <textarea formControlName="descrizione"></textarea>
      </label>

      <label>
        Ingredienti finali del piatto
        <textarea formControlName="ingredienti" placeholder="Qui puoi aggiungere o togliere ingredienti dalla ricetta proposta, separandoli con una virgola"></textarea>
      </label>

      <label>Allergeni standard</label>
      <div class="allergen-grid">
        <button
          type="button"
          class="allergen-chip"
          *ngFor="let allergen of standardAllergens"
          [class.active]="isAllergenSelected(allergen)"
          (click)="toggleAllergen(allergen)"
        >
          {{ allergen }}
        </button>
      </div>

      <label>
        Altri allergeni / note
        <textarea formControlName="allergeniCustom" placeholder="Es. tracce di pistacchio, contaminazione crociata"></textarea>
      </label>

      <label>
        Categoria
        <select formControlName="categoria">
            <option [ngValue]="null">Seleziona...</option>
            <option *ngFor="let cat of categorie" [ngValue]="cat[0]">{{ cat[1] }}</option>
        </select>
      </label>

      <label>
        Prezzo
        <input type="number" formControlName="prezzo" />
      </label>

      <label>
        Immagine attuale
        <img
            class="preview-img"
            [src]="imagePreviewUrl || imageUrlOriginale"
        />
      </label>

      <label>
        Carica nuova immagine
        <input type="file" #fileInput (change)="onImageSelected($event)" />
      </label>
      <div *ngIf="nuovaImmagine" class="image-cancel">
        <button type="button" (click)="annullaNuovaImmagine()">Annulla immagine selezionata</button>
      </div>

      <label class="disponibile-checkbox">
        <input type="checkbox" formControlName="disponibile" />
        Disponibile
      </label>

      <button type="submit" [disabled]="form.invalid">Salva modifiche</button>
    </form>
  </div>
</div>
